<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Formaxe - Acquisition</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="../images/logo.png" alt="Formaxe" class="popup-logo">
      <span class="popup-logo-separator">×</span>
      <img src="../images/logo-stafy.png" alt="Stafy" class="popup-logo-stafy">
      <h1 class="popup-title">Formaxe - Acquisition</h1>
    </div>

    <div class="popup-body">
      <div class="popup-status" id="status-msg">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Vérification...</span>
      </div>

      <div class="popup-info">
        <p>Cette extension détecte automatiquement les contacts sur <strong>Decidento</strong> et permet de les exporter via webhook.</p>
      </div>

      <div class="popup-stats" id="stats-section" style="display:none;">
        <div class="stat-item">
          <span class="stat-number" id="contacts-count">0</span>
          <span class="stat-label">contacts détectés</span>

      </div>

    </div>

    <div class="popup-footer">
      <span class="footer-version">v1.6.0</span>
      <span class="footer-dev">Developed by Gripow</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
